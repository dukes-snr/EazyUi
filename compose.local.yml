services:
  postgres:
    image: postgres:17-alpine
    container_name: eazyui-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eazyui
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - eazyui_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eazyui"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  eazyui_postgres_data:
